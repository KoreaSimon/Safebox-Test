<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>컨테이너 창고 관리</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="theme-toggle">
        <button id="theme-btn" onclick="toggleTheme()">🌙 다크 모드</button>
    </div>

    <div id="grid" class="grid"></div>

    <div class="side-panel">
        <div class="stats">Occupied: <span id="occupiedCount">0</span></div>
        <div class="stats">Empty: <span id="emptyCount">100</span></div>
        <div class="stats">Occupancy Rate: <span id="rate">0%</span></div>

        <button onclick="resetAll()">전체 초기화</button>
    </div>

    <script src="main.js"></script>
</body>
</html>
